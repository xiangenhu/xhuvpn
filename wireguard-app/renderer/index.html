<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WireGuard Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <h1>WireGuard</h1>
      </div>
      <div class="header-actions">
        <button id="btn-fetch" class="btn btn-accent" title="Fetch from VPN server">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 11-6.219-8.56"/><polyline points="21 3 21 9 15 9"/>
          </svg>
          Fetch
        </button>
        <button id="btn-settings" class="btn-icon" title="Server settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
        <button id="btn-import" class="btn btn-secondary" title="Import .conf file">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Import
        </button>
        <button id="btn-add" class="btn btn-primary" title="Create new tunnel">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add
        </button>
      </div>
    </header>

    <!-- Tunnel List -->
    <div id="tunnel-list" class="tunnel-list">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <p>No tunnels configured</p>
        <p class="hint">Import a .conf file or add a tunnel manually</p>
      </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h2 id="modal-title">Add Tunnel</h2>
        <div class="form-group">
          <label for="tunnel-name">Name</label>
          <input type="text" id="tunnel-name" placeholder="my-vpn" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="tunnel-config">Configuration</label>
          <textarea id="tunnel-config" rows="12" placeholder="[Interface]
PrivateKey = ...
Address = 10.8.0.2/24
DNS = 1.1.1.1

[Peer]
PublicKey = ...
Endpoint = vpn.example.com:51820
AllowedIPs = 0.0.0.0/0"></textarea>
        </div>
        <div class="modal-actions">
          <button id="btn-modal-cancel" class="btn btn-secondary">Cancel</button>
          <button id="btn-modal-save" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>

    <!-- Server Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h2>Server Settings</h2>
        <p class="modal-desc">Connect to your WireGuard VPN Manager server to fetch peer configs automatically.</p>
        <div class="form-group">
          <label for="server-url">Server URL</label>
          <input type="url" id="server-url" placeholder="https://vpn.example.com">
        </div>
        <div class="form-group">
          <label for="server-key">API Key</label>
          <input type="password" id="server-key" placeholder="Your API key">
        </div>
        <div class="modal-actions">
          <button id="btn-settings-cancel" class="btn btn-secondary">Cancel</button>
          <button id="btn-settings-save" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>

    <!-- Fetch Peers Modal -->
    <div id="fetch-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h2>Fetch from Server</h2>
        <div id="fetch-loading" class="fetch-loading">Loading peers...</div>
        <div id="fetch-list" class="fetch-list"></div>
        <div class="modal-actions">
          <button id="btn-fetch-close" class="btn btn-secondary">Close</button>
        </div>
      </div>
    </div>

    <!-- Status Panel (slides up when a tunnel is selected) -->
    <div id="status-panel" class="status-panel hidden">
      <div class="status-header">
        <h3 id="status-name">Tunnel</h3>
        <button id="btn-status-close" class="btn-icon" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="status-body" class="status-body">
        <div class="status-row"><span class="label">Status</span><span id="stat-status" class="value">--</span></div>
        <div class="status-row"><span class="label">Endpoint</span><span id="stat-endpoint" class="value">--</span></div>
        <div class="status-row"><span class="label">Transfer</span><span id="stat-transfer" class="value">--</span></div>
        <div class="status-row"><span class="label">Handshake</span><span id="stat-handshake" class="value">--</span></div>
        <div class="status-row"><span class="label">Allowed IPs</span><span id="stat-allowed" class="value">--</span></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
